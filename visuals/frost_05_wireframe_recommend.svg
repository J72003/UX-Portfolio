<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wireframe of the Frost Bank platform recommendation result screen showing recommended product, feature list, and CTA">
  <rect width="720" height="380" fill="#16140F"/>

  <!-- Browser frame -->
  <rect x="140" y="20" width="440" height="340" rx="6" fill="none" stroke="#2A2620" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="360" y="50" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876" text-anchor="middle">BASED ON YOUR ANSWERS</text>

  <!-- Recommendation headline -->
  <text x="360" y="80" font-family="Instrument Serif, serif" font-size="20" fill="#F2EBDC" text-anchor="middle" font-style="italic">Business Online</text>
  <text x="360" y="100" font-family="Geist, sans-serif" font-size="11" fill="#9A9384" text-anchor="middle">is the right fit for your business</text>

  <!-- Divider -->
  <line x1="240" y1="116" x2="480" y2="116" stroke="#2A2620" stroke-width="1"/>

  <!-- Feature list -->
  <text x="240" y="140" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">WHAT'S INCLUDED</text>

  <!-- Feature row 1 -->
  <line x1="240" y1="154" x2="248" y2="154" stroke="#C9A876" stroke-width="1.5"/>
  <text x="256" y="158" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Account balances and transaction history</text>

  <!-- Feature row 2 -->
  <line x1="240" y1="174" x2="248" y2="174" stroke="#C9A876" stroke-width="1.5"/>
  <text x="256" y="178" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Bill pay and standard ACH transfers</text>

  <!-- Feature row 3 -->
  <line x1="240" y1="194" x2="248" y2="194" stroke="#C9A876" stroke-width="1.5"/>
  <text x="256" y="198" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Up to 5 user accounts with role access</text>

  <!-- Feature row 4 -->
  <line x1="240" y1="214" x2="248" y2="214" stroke="#C9A876" stroke-width="1.5"/>
  <text x="256" y="218" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Mobile deposit and card management</text>

  <!-- Not included note -->
  <text x="240" y="244" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B">NOT INCLUDED</text>
  <text x="240" y="260" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">High-volume wire transfers, advanced user permissions,</text>
  <text x="240" y="272" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">and Treasury Management tools.</text>
  <text x="240" y="286" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Need those? <tspan fill="#C9A876">See Treasury Management →</tspan></text>

  <!-- CTA -->
  <rect x="240" y="304" width="180" height="36" rx="4" fill="#F2EBDC"/>
  <text x="330" y="326" font-family="Geist, sans-serif" font-size="12" fill="#0F0E0C" text-anchor="middle" font-weight="500">Open an account →</text>

  <rect x="432" y="304" width="128" height="36" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="496" y="326" font-family="Geist, sans-serif" font-size="11" fill="#9A9384" text-anchor="middle">Talk to a banker</text>

  <!-- Annotations -->
  <line x1="580" y1="80" x2="620" y2="80" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="624" y="76" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">RECOMMENDATION</text>
  <text x="624" y="89" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">Named, not described</text>

  <line x1="580" y1="285" x2="620" y2="270" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="624" y="267" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">TRANSPARENT SCOPE</text>
  <text x="624" y="280" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">Shows what's not included</text>

  <text x="360" y="372" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">FROST BANK SMB · SCREEN · RECOMMENDATION RESULT · WIREFRAME</text>
</svg>
