<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Future-state user flow for Frost Bank platform recommendation showing three outcome branches based on business needs">
  <rect width="720" height="280" fill="#16140F"/>

  <!-- Title -->
  <text x="360" y="22" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384" text-anchor="middle">FUTURE-STATE RECOMMENDATION FLOW</text>

  <!-- Node: Entry -->
  <rect x="300" y="36" width="120" height="36" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="360" y="54" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle">Start: What do</text>
  <text x="360" y="66" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle">you need?</text>

  <!-- Arrow down -->
  <line x1="360" y1="72" x2="360" y2="96" stroke="#2A2620" stroke-width="1"/>
  <polygon points="356,96 360,104 364,96" fill="#2A2620"/>

  <!-- Node: Q1 — employees -->
  <rect x="280" y="104" width="160" height="36" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="360" y="120" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384" text-anchor="middle">Q1</text>
  <text x="360" y="134" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle">How many employees?</text>

  <!-- Arrow down -->
  <line x1="360" y1="140" x2="360" y2="160" stroke="#2A2620" stroke-width="1"/>
  <polygon points="356,160 360,168 364,160" fill="#2A2620"/>

  <!-- Node: Q2 — payments -->
  <rect x="280" y="168" width="160" height="36" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="360" y="184" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384" text-anchor="middle">Q2</text>
  <text x="360" y="198" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle">High-volume wire/ACH?</text>

  <!-- Three branches from Q2 -->
  <!-- Left branch: Solo / simple -->
  <line x1="280" y1="186" x2="160" y2="186" stroke="#2A2620" stroke-width="1"/>
  <line x1="160" y1="186" x2="160" y2="230" stroke="#2A2620" stroke-width="1"/>
  <polygon points="156,230 160,238 164,230" fill="#2A2620"/>
  <text x="160" y="210" font-family="Geist Mono, monospace" font-size="7" fill="#5A554B" text-anchor="middle">SOLO, LOW VOL</text>

  <rect x="100" y="238" width="120" height="30" rx="4" fill="#C9A876" fill-opacity="0.12" stroke="#C9A876" stroke-width="1"/>
  <text x="160" y="253" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle">Business Online</text>
  <text x="160" y="265" font-family="Geist Mono, monospace" font-size="7" fill="#C9A876" text-anchor="middle">RECOMMENDED</text>

  <!-- Middle branch: Growth -->
  <line x1="360" y1="204" x2="360" y2="230" stroke="#2A2620" stroke-width="1"/>
  <polygon points="356,230 360,238 364,230" fill="#2A2620"/>
  <text x="360" y="222" font-family="Geist Mono, monospace" font-size="7" fill="#5A554B" text-anchor="middle">SMALL TEAM</text>

  <rect x="300" y="238" width="120" height="30" rx="4" fill="#C9A876" fill-opacity="0.12" stroke="#C9A876" stroke-width="1"/>
  <text x="360" y="253" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle">Business Online+</text>
  <text x="360" y="265" font-family="Geist Mono, monospace" font-size="7" fill="#C9A876" text-anchor="middle">RECOMMENDED</text>

  <!-- Right branch: Treasury -->
  <line x1="440" y1="186" x2="560" y2="186" stroke="#2A2620" stroke-width="1"/>
  <line x1="560" y1="186" x2="560" y2="230" stroke="#2A2620" stroke-width="1"/>
  <polygon points="556,230 560,238 564,230" fill="#2A2620"/>
  <text x="560" y="210" font-family="Geist Mono, monospace" font-size="7" fill="#5A554B" text-anchor="middle">HIGH VOL / COMPLEX</text>

  <rect x="500" y="238" width="120" height="30" rx="4" fill="#C9A876" fill-opacity="0.12" stroke="#C9A876" stroke-width="1"/>
  <text x="560" y="253" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle">Treasury Mgmt</text>
  <text x="560" y="265" font-family="Geist Mono, monospace" font-size="7" fill="#C9A876" text-anchor="middle">RECOMMENDED</text>

  <text x="360" y="22" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle" dy="258">FROST BANK SMB · FUTURE-STATE FLOW · 3 OUTCOME PATHS</text>
</svg>
