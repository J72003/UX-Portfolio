<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inverte-Quest revised save observation screen with selectable candidate cards and radio selection state">
  <rect width="720" height="360" fill="#16140F"/>

  <!-- Phone frame -->
  <rect x="260" y="20" width="200" height="320" rx="18" fill="none" stroke="#2A2620" stroke-width="1.5"/>
  <rect x="268" y="36" width="184" height="288" rx="4" fill="#1A1810"/>

  <!-- Screen header -->
  <text x="360" y="58" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384" text-anchor="middle">SELECT IDENTIFICATION</text>

  <!-- Candidate A — selected state -->
  <rect x="276" y="70" width="168" height="64" rx="4" fill="#C9A876" fill-opacity="0.08" stroke="#C9A876" stroke-width="1"/>
  <circle cx="294" cy="102" r="7" fill="none" stroke="#C9A876" stroke-width="1.5"/>
  <circle cx="294" cy="102" r="4" fill="#C9A876"/>
  <text x="308" y="94" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">CANDIDATE A · 42%</text>
  <text x="308" y="108" font-family="Geist, sans-serif" font-size="12" fill="#F2EBDC" font-style="italic">Chironomidae</text>
  <text x="308" y="122" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">Midge larvae</text>

  <!-- Candidate B — unselected state -->
  <rect x="276" y="142" width="168" height="64" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <circle cx="294" cy="174" r="7" fill="none" stroke="#5A554B" stroke-width="1.5"/>
  <text x="308" y="166" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B">CANDIDATE B · 38%</text>
  <text x="308" y="180" font-family="Geist, sans-serif" font-size="12" fill="#9A9384" font-style="italic">Baetidae</text>
  <text x="308" y="194" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">Small minnow mayfly</text>

  <!-- Save unidentified option -->
  <rect x="276" y="214" width="168" height="40" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <circle cx="294" cy="234" r="7" fill="none" stroke="#5A554B" stroke-width="1.5"/>
  <text x="308" y="230" font-family="Geist, sans-serif" font-size="11" fill="#5A554B">Save as unidentified</text>
  <text x="308" y="244" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B">No ID assigned</text>

  <!-- Save button -->
  <rect x="280" y="268" width="160" height="36" rx="4" fill="#F2EBDC"/>
  <text x="360" y="291" font-family="Geist, sans-serif" font-size="12" fill="#0F0E0C" text-anchor="middle" font-weight="500">Save observation</text>

  <!-- Annotations -->
  <line x1="448" y1="102" x2="500" y2="102" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="504" y="98" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">RADIO SELECTION</text>
  <text x="504" y="111" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">Explicit selectable state</text>

  <line x1="448" y1="174" x2="500" y2="174" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="504" y="170" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">UNSELECTED STATE</text>
  <text x="504" y="183" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">Visual hierarchy preserved</text>

  <text x="360" y="348" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">INVERTE-QUEST · SAVE OBSERVATION · REVISED AFTER TESTING</text>
</svg>
