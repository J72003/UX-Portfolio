<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inverte-Quest result screen for high confidence match showing bold species name and single save action">
  <rect width="720" height="360" fill="#16140F"/>

  <!-- Phone frame -->
  <rect x="260" y="20" width="200" height="320" rx="18" fill="none" stroke="#2A2620" stroke-width="1.5"/>
  <rect x="268" y="36" width="184" height="288" rx="4" fill="#1A1810"/>

  <!-- Photo thumbnail -->
  <rect x="272" y="44" width="176" height="120" rx="2" fill="#111009"/>
  <text x="360" y="108" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">CAPTURED PHOTO</text>

  <!-- Confidence band: HIGH -->
  <rect x="272" y="168" width="176" height="20" rx="2" fill="#C9A876" fill-opacity="0.15" stroke="#C9A876" stroke-width="1"/>
  <text x="296" y="182" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876">HIGH CONFIDENCE · 91%</text>

  <!-- Species name -->
  <text x="280" y="210" font-family="Instrument Serif, serif" font-size="16" fill="#F2EBDC" font-style="italic">Perlidae</text>
  <text x="280" y="224" font-family="Geist, sans-serif" font-size="10" fill="#9A9384">Common Stonefly · Order Plecoptera</text>

  <!-- Explanation -->
  <text x="280" y="244" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">Strong visual match on wing venation</text>
  <text x="280" y="256" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">and body segmentation pattern.</text>

  <!-- Save button -->
  <rect x="280" y="268" width="160" height="36" rx="4" fill="#F2EBDC"/>
  <text x="360" y="291" font-family="Geist, sans-serif" font-size="12" fill="#0F0E0C" text-anchor="middle" font-weight="500">Save observation</text>

  <!-- Annotations -->
  <line x1="448" y1="178" x2="500" y2="178" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="504" y="174" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">CONFIDENCE BAND</text>
  <text x="504" y="187" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">3 tiers: high / med / low</text>

  <line x1="448" y1="286" x2="500" y2="286" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="504" y="282" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">SINGLE PRIMARY ACTION</text>
  <text x="504" y="295" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">No decision friction</text>

  <text x="360" y="348" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">INVERTE-QUEST · RESULT SCREEN · HIGH CONFIDENCE</text>
</svg>
