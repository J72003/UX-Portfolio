<svg viewBox="0 0 720 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inverte-Quest result screen for low confidence match showing two candidate options and split save actions">
  <rect width="720" height="380" fill="#16140F"/>

  <!-- Phone frame -->
  <rect x="260" y="20" width="200" height="340" rx="18" fill="none" stroke="#2A2620" stroke-width="1.5"/>
  <rect x="268" y="36" width="184" height="308" rx="4" fill="#1A1810"/>

  <!-- Photo thumbnail -->
  <rect x="272" y="44" width="176" height="90" rx="2" fill="#111009"/>
  <text x="360" y="93" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">CAPTURED PHOTO</text>

  <!-- Confidence band: LOW -->
  <rect x="272" y="138" width="176" height="20" rx="2" fill="none" stroke="#5A554B" stroke-width="1"/>
  <text x="296" y="152" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">LOW CONFIDENCE · 42%</text>

  <!-- Explanation -->
  <text x="280" y="174" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">The model found two close matches.</text>
  <text x="280" y="187" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">A clearer photo may help narrow it.</text>

  <!-- Candidate A -->
  <rect x="272" y="198" width="84" height="52" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="314" y="218" font-family="Geist Mono, monospace" font-size="7" fill="#9A9384" text-anchor="middle">CANDIDATE A</text>
  <text x="314" y="232" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle" font-style="italic">Chironomidae</text>
  <text x="314" y="244" font-family="Geist Mono, monospace" font-size="7" fill="#5A554B" text-anchor="middle">42%</text>

  <!-- Candidate B -->
  <rect x="364" y="198" width="84" height="52" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="406" y="218" font-family="Geist Mono, monospace" font-size="7" fill="#9A9384" text-anchor="middle">CANDIDATE B</text>
  <text x="406" y="232" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC" text-anchor="middle" font-style="italic">Baetidae</text>
  <text x="406" y="244" font-family="Geist Mono, monospace" font-size="7" fill="#5A554B" text-anchor="middle">38%</text>

  <!-- Recapture button -->
  <rect x="280" y="262" width="160" height="30" rx="4" fill="none" stroke="#F2EBDC" stroke-width="1"/>
  <text x="360" y="281" font-family="Geist, sans-serif" font-size="11" fill="#F2EBDC" text-anchor="middle">Recapture</text>

  <!-- Save unidentified button -->
  <rect x="280" y="300" width="160" height="30" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="360" y="319" font-family="Geist, sans-serif" font-size="11" fill="#9A9384" text-anchor="middle">Save as unidentified</text>

  <!-- Annotations -->
  <line x1="448" y1="224" x2="508" y2="180" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="512" y="177" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">TWO EQUAL CANDIDATES</text>
  <text x="512" y="190" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">No default selection</text>

  <line x1="448" y1="315" x2="508" y2="315" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="512" y="311" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">SPLIT ACTIONS</text>
  <text x="512" y="324" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">No "Save" as default CTA</text>

  <text x="360" y="368" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">INVERTE-QUEST · RESULT SCREEN · LOW CONFIDENCE</text>
</svg>
