<svg viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Potr-Aid upload screen wireframe showing drag-and-drop zone and single analyze action">
  <rect width="720" height="340" fill="#16140F"/>

  <!-- Browser frame -->
  <rect x="160" y="20" width="400" height="300" rx="6" fill="none" stroke="#2A2620" stroke-width="1"/>

  <!-- Page title -->
  <text x="360" y="50" font-family="Instrument Serif, serif" font-size="18" fill="#F2EBDC" text-anchor="middle" font-style="italic">Potr-Aid</text>
  <text x="360" y="66" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">PORTRAIT COMPOSITION FEEDBACK</text>

  <!-- Drop zone -->
  <rect x="180" y="78" width="360" height="140" rx="4" fill="none" stroke="#2A2620" stroke-width="1" stroke-dasharray="6,4"/>
  <rect x="346" y="104" width="28" height="22" rx="2" fill="none" stroke="#5A554B" stroke-width="1"/>
  <line x1="346" y1="114" x2="374" y2="114" stroke="#5A554B" stroke-width="1"/>
  <polygon points="354,108 360,104 366,108" fill="none" stroke="#5A554B" stroke-width="1"/>

  <text x="360" y="144" font-family="Geist, sans-serif" font-size="11" fill="#9A9384" text-anchor="middle">Drag a portrait here</text>
  <text x="360" y="160" font-family="Geist, sans-serif" font-size="10" fill="#5A554B" text-anchor="middle">or</text>
  <text x="360" y="178" font-family="Geist, sans-serif" font-size="11" fill="#C9A876" text-anchor="middle">Browse files →</text>
  <text x="360" y="204" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">JPEG · PNG · Max 10MB</text>

  <!-- Submit button -->
  <rect x="280" y="238" width="160" height="36" rx="4" fill="#F2EBDC"/>
  <text x="360" y="261" font-family="Geist, sans-serif" font-size="12" fill="#0F0E0C" text-anchor="middle" font-weight="500">Analyze composition</text>

  <!-- Note -->
  <text x="360" y="294" font-family="Geist, sans-serif" font-size="9" fill="#5A554B" text-anchor="middle">Results include a confidence score and composition notes.</text>
  <text x="360" y="308" font-family="Geist, sans-serif" font-size="9" fill="#5A554B" text-anchor="middle">The model is 92% accurate on the test set. Use judgment.</text>

  <!-- Annotations -->
  <line x1="540" y1="148" x2="580" y2="148" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="584" y="144" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">DROP ZONE</text>
  <text x="584" y="157" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">Primary input</text>

  <line x1="440" y1="256" x2="580" y2="220" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="584" y="217" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">SINGLE ACTION</text>
  <text x="584" y="230" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">One step to result</text>

  <text x="360" y="330" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">POTR-AID · UPLOAD SCREEN · WIREFRAME</text>
</svg>
