<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Potr-Aid result screen showing portrait with attention overlay, confidence score, verdict, composition note, and accuracy disclosure">
  <rect width="720" height="400" fill="#16140F"/>

  <!-- Browser chrome -->
  <rect x="140" y="20" width="440" height="360" rx="6" fill="none" stroke="#2A2620" stroke-width="1"/>

  <!-- Left: photo + overlay -->
  <rect x="156" y="40" width="180" height="200" rx="4" fill="#111009"/>
  <ellipse cx="246" cy="80" rx="28" ry="34" fill="#1E1C17"/>
  <rect x="218" y="110" width="56" height="80" rx="6" fill="#1E1C17"/>
  <rect x="156" y="40" width="60" height="60" rx="4" fill="#181610"/>
  <rect x="276" y="40" width="60" height="60" rx="4" fill="#181610"/>

  <!-- Attention overlay -->
  <rect x="156" y="40" width="60" height="60" rx="4" fill="#C9A876" fill-opacity="0.28"/>
  <rect x="276" y="40" width="60" height="60" rx="4" fill="#C9A876" fill-opacity="0.22"/>
  <ellipse cx="246" cy="80" rx="28" ry="34" fill="#C9A876" fill-opacity="0.06"/>

  <!-- Overlay legend -->
  <text x="160" y="256" font-family="Geist Mono, monospace" font-size="7" fill="#9A9384">ATTENTION OVERLAY</text>
  <defs>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16140F"/>
      <stop offset="100%" stop-color="#C9A876" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect x="160" y="262" width="80" height="6" rx="2" fill="url(#heat)"/>
  <text x="160" y="280" font-family="Geist Mono, monospace" font-size="7" fill="#5A554B">LOW</text>
  <text x="230" y="280" font-family="Geist Mono, monospace" font-size="7" fill="#5A554B" text-anchor="end">HIGH</text>

  <!-- Right column -->
  <text x="358" y="58" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">VERDICT</text>
  <text x="358" y="76" font-family="Instrument Serif, serif" font-size="17" fill="#F2EBDC" font-style="italic">Needs improvement</text>

  <text x="358" y="100" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">CONFIDENCE</text>
  <rect x="358" y="108" width="200" height="16" rx="2" fill="#2A2620"/>
  <rect x="358" y="108" width="134" height="16" rx="2" fill="#C9A876" fill-opacity="0.4"/>
  <text x="362" y="121" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876">67% · MODEL IS UNCERTAIN</text>

  <text x="358" y="148" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">COMPOSITION NOTE</text>
  <text x="358" y="166" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">The model flagged the background region.</text>
  <text x="358" y="180" font-family="Geist, sans-serif" font-size="10" fill="#9A9384">Check whether the subject is visually</text>
  <text x="358" y="194" font-family="Geist, sans-serif" font-size="10" fill="#9A9384">separated from what's behind them.</text>

  <line x1="358" y1="210" x2="558" y2="210" stroke="#2A2620" stroke-width="1"/>

  <rect x="358" y="220" width="110" height="28" rx="4" fill="#F2EBDC"/>
  <text x="413" y="238" font-family="Geist, sans-serif" font-size="10" fill="#0F0E0C" text-anchor="middle" font-weight="500">Analyze another</text>

  <rect x="480" y="220" width="78" height="28" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="519" y="238" font-family="Geist, sans-serif" font-size="10" fill="#9A9384" text-anchor="middle">Save result</text>

  <!-- Disclosure note -->
  <rect x="156" y="308" width="402" height="48" rx="4" fill="#1A1810"/>
  <text x="174" y="328" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">NOTE</text>
  <text x="174" y="342" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">This model is 92% accurate on the test set. Treat this as a second</text>
  <text x="174" y="354" font-family="Geist, sans-serif" font-size="9" fill="#5A554B">opinion, not a verdict. Your judgment is the final authority.</text>

  <!-- Annotations -->
  <line x1="336" y1="120" x2="310" y2="120" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="310" y1="120" x2="310" y2="160" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="156" y="140" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">CONFIDENCE BAR</text>
  <text x="156" y="152" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B">With text gloss</text>

  <line x1="558" y1="332" x2="590" y2="332" stroke="#2A2620" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="594" y="328" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">DISCLOSURE NOTE</text>
  <text x="594" y="341" font-family="Geist Mono, monospace" font-size="9" fill="#5A554B">Every result, always</text>

  <text x="360" y="390" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">POTR-AID · RESULT SCREEN · WITH ATTENTION OVERLAY + DISCLOSURE</text>
</svg>
