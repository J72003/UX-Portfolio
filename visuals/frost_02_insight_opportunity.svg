<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Research insight to design opportunity map with 5 rows showing key findings and their design implications">
  <rect width="720" height="320" fill="#16140F"/>

  <!-- Column headers -->
  <text x="20" y="24" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384">RESEARCH INSIGHT</text>
  <line x1="20" y1="30" x2="340" y2="30" stroke="#2A2620" stroke-width="1"/>
  <text x="380" y="24" font-family="Geist Mono, monospace" font-size="9" fill="#C9A876">DESIGN OPPORTUNITY</text>
  <line x1="380" y1="30" x2="700" y2="30" stroke="#C9A876" stroke-width="1" opacity="0.4"/>

  <!-- Column divider arrow -->
  <text x="355" y="160" font-family="Geist Mono, monospace" font-size="16" fill="#2A2620" text-anchor="middle">→</text>

  <!-- Row 1 -->
  <rect x="20" y="42" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="32" y="60" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">01</text>
  <text x="48" y="60" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">SMB owners conflate platform names</text>
  <text x="48" y="74" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Business Online vs. Treasury — not clear</text>

  <rect x="380" y="42" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="392" y="60" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876">01</text>
  <text x="408" y="60" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Rename or distinguish by use-case</text>
  <text x="408" y="74" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Not by technology</text>

  <!-- Row 2 -->
  <rect x="20" y="94" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="32" y="112" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">02</text>
  <text x="48" y="112" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Decision made by banker, not customer</text>
  <text x="48" y="126" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">No self-service fit evaluation exists</text>

  <rect x="380" y="94" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="392" y="112" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876">02</text>
  <text x="408" y="112" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Build a guided recommendation flow</text>
  <text x="408" y="126" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Customer-facing, needs-based</text>

  <!-- Row 3 -->
  <rect x="20" y="146" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="32" y="164" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">03</text>
  <text x="48" y="164" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Complexity scales with employee count</text>
  <text x="48" y="178" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Permissions, approvals, multi-user</text>

  <rect x="380" y="146" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="392" y="164" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876">03</text>
  <text x="408" y="164" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Use employee count as primary qualifier</text>
  <text x="408" y="178" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Early in recommendation flow</text>

  <!-- Row 4 -->
  <rect x="20" y="198" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="32" y="216" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">04</text>
  <text x="48" y="216" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Wire/ACH need determines upgrade path</text>
  <text x="48" y="230" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">High-volume transfers need Treasury</text>

  <rect x="380" y="198" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="392" y="216" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876">04</text>
  <text x="408" y="216" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Add payment volume question to flow</text>
  <text x="408" y="230" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Branch to Treasury if threshold met</text>

  <!-- Row 5 -->
  <rect x="20" y="250" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="32" y="268" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">05</text>
  <text x="48" y="268" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Trust in Frost brand reduces churn risk</text>
  <text x="48" y="282" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">But unmet expectations still cause drops</text>

  <rect x="380" y="250" width="320" height="44" rx="3" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="392" y="268" font-family="Geist Mono, monospace" font-size="8" fill="#C9A876">05</text>
  <text x="408" y="268" font-family="Geist, sans-serif" font-size="10" fill="#F2EBDC">Set expectations at platform selection</text>
  <text x="408" y="282" font-family="Geist, sans-serif" font-size="9" fill="#9A9384">Show what is and isn't included</text>

  <text x="360" y="308" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">FROST BANK SMB · RESEARCH INSIGHT → DESIGN OPPORTUNITY · 5 FINDINGS</text>
</svg>
