<svg viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inverte-Quest capture-to-save user flow showing five steps from open app to saved observation">
  <rect width="720" height="220" fill="#16140F"/>

  <!-- Step nodes -->
  <rect x="20" y="80" width="110" height="60" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="75" y="106" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384" text-anchor="middle">STEP 1</text>
  <text x="75" y="122" font-family="Geist, sans-serif" font-size="11" fill="#F2EBDC" text-anchor="middle">Open App</text>
  <text x="75" y="136" font-family="Geist, sans-serif" font-size="10" fill="#5A554B" text-anchor="middle">Camera ready</text>

  <line x1="130" y1="110" x2="158" y2="110" stroke="#2A2620" stroke-width="1"/>
  <polygon points="158,106 166,110 158,114" fill="#2A2620"/>

  <rect x="166" y="80" width="110" height="60" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="221" y="106" font-family="Geist Mono, monospace" font-size="9" fill="#9A9384" text-anchor="middle">STEP 2</text>
  <text x="221" y="122" font-family="Geist, sans-serif" font-size="11" fill="#F2EBDC" text-anchor="middle">Frame + Capture</text>
  <text x="221" y="136" font-family="Geist, sans-serif" font-size="10" fill="#5A554B" text-anchor="middle">One-thumb tap</text>

  <line x1="276" y1="110" x2="304" y2="110" stroke="#2A2620" stroke-width="1"/>
  <polygon points="304,106 312,110 304,114" fill="#2A2620"/>

  <rect x="312" y="80" width="110" height="60" rx="4" fill="none" stroke="#C9A876" stroke-width="1"/>
  <text x="367" y="106" font-family="Geist Mono, monospace" font-size="9" fill="#C9A876" text-anchor="middle">STEP 3</text>
  <text x="367" y="122" font-family="Geist, sans-serif" font-size="11" fill="#F2EBDC" text-anchor="middle">View Result</text>
  <text x="367" y="136" font-family="Geist, sans-serif" font-size="10" fill="#5A554B" text-anchor="middle">Confidence shown</text>

  <!-- High confidence path -->
  <line x1="422" y1="110" x2="450" y2="110" stroke="#2A2620" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="110" x2="450" y2="60" stroke="#2A2620" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="60" x2="478" y2="60" stroke="#2A2620" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="478,56 486,60 478,64" fill="#2A2620"/>
  <text x="455" y="48" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">HIGH CONF</text>

  <rect x="486" y="40" width="110" height="40" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="541" y="56" font-family="Geist, sans-serif" font-size="11" fill="#F2EBDC" text-anchor="middle">Accept Match</text>
  <text x="541" y="70" font-family="Geist, sans-serif" font-size="10" fill="#5A554B" text-anchor="middle">→ Save</text>

  <!-- Low confidence path -->
  <line x1="422" y1="110" x2="450" y2="110" stroke="#2A2620" stroke-width="1"/>
  <line x1="450" y1="110" x2="450" y2="160" stroke="#2A2620" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="160" x2="478" y2="160" stroke="#2A2620" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="478,156 486,160 478,164" fill="#2A2620"/>
  <text x="455" y="152" font-family="Geist Mono, monospace" font-size="8" fill="#9A9384">LOW CONF</text>

  <rect x="486" y="140" width="110" height="40" rx="4" fill="none" stroke="#2A2620" stroke-width="1"/>
  <text x="541" y="156" font-family="Geist, sans-serif" font-size="11" fill="#F2EBDC" text-anchor="middle">Recapture or</text>
  <text x="541" y="170" font-family="Geist, sans-serif" font-size="10" fill="#5A554B" text-anchor="middle">Flag + Save</text>

  <!-- Merge to saved -->
  <line x1="596" y1="60" x2="640" y2="60" stroke="#2A2620" stroke-width="1"/>
  <line x1="640" y1="60" x2="640" y2="100" stroke="#2A2620" stroke-width="1"/>
  <polygon points="636,100 640,108 644,100" fill="#2A2620"/>
  <line x1="596" y1="160" x2="640" y2="160" stroke="#2A2620" stroke-width="1"/>
  <line x1="640" y1="160" x2="640" y2="130" stroke="#2A2620" stroke-width="1"/>
  <polygon points="636,130 640,122 644,130" fill="#2A2620"/>

  <rect x="610" y="100" width="96" height="30" rx="4" fill="#C9A876" fill-opacity="0.12" stroke="#C9A876" stroke-width="1"/>
  <text x="658" y="119" font-family="Geist, sans-serif" font-size="11" fill="#F2EBDC" text-anchor="middle">Saved</text>

  <text x="360" y="204" font-family="Geist Mono, monospace" font-size="8" fill="#5A554B" text-anchor="middle">INVERTE-QUEST · CAPTURE-TO-SAVE FLOW · DASHED = CONDITIONAL PATH</text>
</svg>
